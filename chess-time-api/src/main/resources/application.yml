spring:
  datasource:
    url: jdbc:mysql://localhost:3306/chesstime?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:ASDF}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: read:user,user:email
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email

app:
  jwt-secret: ${JWT_SECRET:change-this-to-a-long-random-secret-at-least-256-bits}
  jwt-expiration-ms: 86400000   # 24 hours
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

server:
  port: 8080

logging:
  level:
    com.chesstime: DEBUG
    org.springframework.web.socket: INFO
