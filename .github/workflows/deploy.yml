name: Deploy to EC2

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"

      - name: Build Spring Boot JAR
        working-directory: chess-time-api
        run: mvn clean package -DskipTests

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy API to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "chess-time-api/target/chess-time-api-*.jar"
          target: "/opt/chess-time-api/"
          strip_components: 2

      - name: Deploy frontend to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".next/standalone/,public/,.next/static/"
          target: "/opt/chess-time-frontend/"

      - name: Copy static assets into standalone
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -rf /opt/chess-time-frontend/.next/standalone/public
            cp -r /opt/chess-time-frontend/public /opt/chess-time-frontend/.next/standalone/
            rm -rf /opt/chess-time-frontend/.next/standalone/.next/static
            cp -r /opt/chess-time-frontend/.next/static /opt/chess-time-frontend/.next/standalone/.next/
            ln -sfn /opt/chess-time-frontend/.next/standalone/server.js /opt/chess-time-frontend/server.js

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart chess-time-api
            sleep 5
            sudo systemctl restart chess-time-frontend
            sudo systemctl is-active chess-time-api
            sudo systemctl is-active chess-time-frontend
